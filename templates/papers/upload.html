{% extends 'base.html' %}

{% block title %}上传论文 - BenchHub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-4">
        <a href="/projects/{{ session_obj.id }}/" class="text-blue-600 hover:text-blue-800">&larr; 返回 {{ session_obj.name }}</a>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-6">上传论文 · {{ session_obj.name }}</h1>

    <div x-data="uploadForm()" class="bg-white shadow rounded-lg p-6">
        {% csrf_token %}
        <form @submit.prevent="submitForm" enctype="multipart/form-data">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">论文标题</label>
                <input type="text" name="title" x-model="title"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="留空则使用文件名">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">arXiv ID（可选）</label>
                <input type="text" name="arxiv_id" x-model="arxivId"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="如: 2401.12345">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">PDF 文件</label>
                <input type="file" name="pdf" accept=".pdf" @change="handleFileSelect"
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <div class="mb-4" x-show="status">
                <div class="text-sm text-gray-600" x-text="statusMessage"></div>
                <div class="mt-2 w-full bg-gray-200 rounded-full h-2">
                    <div class="bg-blue-600 h-2 rounded-full transition-all" :style="{width: progress + '%'}"></div>
                </div>
            </div>

            <button type="submit" :disabled="uploading || !selectedFile"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed">
                <span x-show="!uploading">上传并解析</span>
                <span x-show="uploading">上传中...</span>
            </button>
        </form>
    </div>
</div>

<script>
const sessionId = {{ session_obj.id }};
function uploadForm() {
    return {
        title: '',
        arxivId: '',
        selectedFile: null,
        uploading: false,
        status: false,
        statusMessage: '',
        progress: 0,

        handleFileSelect(e) {
            this.selectedFile = e.target.files[0];
            if (this.selectedFile) {
                // 把文件名（去 .pdf 后缀）自动填到标题，方便查看和修改
                this.title = this.selectedFile.name.replace(/\.pdf$/i, '');
            }
        },

        async submitForm() {
            if (!this.selectedFile) return;

            this.uploading = true;
            this.status = true;
            this.statusMessage = '正在上传...';
            this.progress = 20;

            const formData = new FormData();
            formData.append('title', this.title);
            formData.append('arxiv_id', this.arxivId);
            formData.append('pdf', this.selectedFile);

            try {
                const response = await fetch('/projects/' + sessionId + '/upload/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: formData
                });

                this.progress = 50;

                if (response.ok) {
                    const data = await response.json();
                    this.statusMessage = '解析中 (Step 1/2) - 请稍候...';
                    this.progress = 70;

                    this.pollStatus(data.id);
                } else {
                    alert('上传失败');
                    this.status = false;
                }
            } catch (error) {
                alert('上传出错: ' + error.message);
                this.status = false;
            } finally {
                this.uploading = false;
            }
        },

        async pollStatus(paperId) {
            const check = async () => {
                try {
                    const response = await fetch(`/articles/${paperId}/status/`);
                    const data = await response.json();

                    if (data.status === 'completed') {
                        this.progress = 100;
                        this.statusMessage = '解析完成！';
                        setTimeout(() => {
                            window.location.href = `/articles/${paperId}/`;
                        }, 500);
                    } else if (data.status === 'failed') {
                        this.progress = 0;
                        this.statusMessage = '解析失败: ' + data.error_message;
                    } else {
                        // 中间状态：extracting / calling_llm
                        this.progress = data.status === 'calling_llm' ? 85 : 50;
                        this.statusMessage = data.progress_message || '解析中...';
                        setTimeout(check, 2000);
                    }
                } catch (error) {
                    setTimeout(check, 2000);
                }
            };

            check();
        }
    }
}
</script>
{% endblock %}
