{% extends 'base.html' %}

{% block title %}{% if session %}编辑{% else %}新建{% endif %}项目 - BenchHub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-4">
        <a href="{% if session %}/projects/{{ session.id }}/{% else %}/{% endif %}" class="text-blue-600 hover:text-blue-800">&larr; 返回</a>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-6">
        {% if session %}编辑项目{% else %}新建项目{% endif %}
    </h1>

    <div class="bg-white shadow rounded-lg p-6">
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 text-red-700 text-sm rounded">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">项目名称 *</label>
                <input type="text" name="name" value="{{ session.name|default:'' }}" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="如：动作识别 SOTA 对比">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">项目描述（可选）</label>
                <textarea name="description" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="简要说明项目目标、关注方向等">{{ session.description|default:'' }}</textarea>
            </div>
            <div class="flex space-x-2">
                <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">
                    {% if session %}保存{% else %}创建{% endif %}
                </button>
                <a href="{% if session %}/projects/{{ session.id }}/{% else %}/{% endif %}"
                    class="bg-gray-100 text-gray-700 py-2 px-4 rounded hover:bg-gray-200">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
