{% extends 'base.html' %}

{% block title %}删除项目 - BenchHub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-4">
        <a href="/projects/{{ session.id }}/" class="text-blue-600 hover:text-blue-800">&larr; 返回</a>
    </div>
    <div class="bg-white shadow rounded-lg p-6">
        <h1 class="text-xl font-bold text-red-600 mb-4">确认删除项目</h1>
        <p class="text-gray-700 mb-4">
            将删除项目 <strong>{{ session.name }}</strong> 及其下所有论文与数据。此操作不可恢复。
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="flex space-x-2">
                <button type="submit" class="bg-red-600 text-white py-2 px-4 rounded hover:bg-red-700">确认删除</button>
                <a href="/projects/{{ session.id }}/" class="bg-gray-100 text-gray-700 py-2 px-4 rounded hover:bg-gray-200">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
